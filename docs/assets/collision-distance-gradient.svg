<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">충돌 거리와 거리 gradient</title>
  <desc id="desc">두 물체의 최근접점, 법선, 거리와 각 점의 속도가 거리 변화율을 만드는 관계</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#dc2626"/></marker>
    <style>
      .label { font: 18px sans-serif; fill: #172033; }
      .small { font: 15px sans-serif; fill: #475569; }
      .formula { font: 20px monospace; fill: #172033; }
    </style>
  </defs>
  <rect width="900" height="420" rx="18" fill="#f8fafc"/>
  <text x="34" y="42" class="label" font-weight="700">최근접점의 상대 속도를 법선 방향으로 투영하면 거리 변화율이 된다</text>

  <path d="M100 115 Q210 65 315 130 L295 300 Q185 345 85 270 Z" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <path d="M610 105 Q745 65 820 160 L790 305 Q680 345 585 270 Z" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="150" y="205" class="label">Geometry A</text>
  <text x="666" y="205" class="label">Geometry B</text>

  <circle cx="303" cy="210" r="8" fill="#2563eb"/>
  <circle cx="595" cy="210" r="8" fill="#dc2626"/>
  <text x="276" y="242" class="label">pₐ</text>
  <text x="590" y="242" class="label">pᵦ</text>

  <line x1="311" y1="210" x2="586" y2="210" stroke="#16a34a" stroke-width="5" marker-end="url(#arrow-green)"/>
  <text x="420" y="194" class="label" fill="#16a34a">n, distance d</text>

  <line x1="303" y1="210" x2="350" y2="120" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="222" y="103" class="small">점 A 속도: Jₐ q̇</text>
  <line x1="595" y1="210" x2="690" y2="145" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="650" y="125" class="small">점 B 속도: Jᵦ q̇</text>

  <rect x="92" y="343" width="716" height="52" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="135" y="376" class="formula">ḋ = nᵀ(Jᵦ − Jₐ)q̇ = (∇d)q̇   ·   ḋ &gt; 0 이면 두 물체가 멀어진다</text>
</svg>
