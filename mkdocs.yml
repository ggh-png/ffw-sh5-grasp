site_name: "ffw-sh5-grasp"
site_author: ggh-png
repo_url: https://github.com/ggh-png/ffw-sh5-grasp
site_url: https://ggh-png.github.io/ffw-sh5-grasp/
site_description: "ROBOTIS FFW-SH5의 ROS-free MuJoCo 텔레오퍼레이션 — whole-body/arm-only IK, 실제 스워브 물리, 양손 grasp, reactive collision avoidance와 검증 문서."

theme:
    name: material
    language: ko
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: indigo
          accent: indigo
          toggle:
              icon: material/weather-night
              name: 다크 모드로 전환
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: indigo
          accent: indigo
          toggle:
              icon: material/weather-sunny
              name: 라이트 모드로 전환
    features:
        - navigation.tabs
        - navigation.sections
        - navigation.top
        - navigation.indexes
        - navigation.footer
        - navigation.tracking
        - content.code.copy
        - content.code.annotate
        - search.highlight
        - search.suggest
        - toc.follow

use_directory_urls: false

markdown_extensions:
    - meta
    - attr_list
    - md_in_html
    - admonition
    - def_list
    - tables
    - footnotes
    - toc:
        permalink: true
    - pymdownx.details
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences:
        custom_fences:
            - name: mermaid
              class: mermaid
              format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.tabbed:
        alternate_style: true
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: Copyright &copy; 2026 ggh-png

extra:
    social:
        - icon: fontawesome/brands/github
          link: https://github.com/ggh-png/ffw-sh5-grasp

extra_css:
    - css/custom.css

extra_javascript:
    - javascripts/mathjax.js
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
    - 홈: index.md
    - 시작하기:
        - 10분 빠른 시작: getting-started.md
        - 조작과 UI: run.md
        - 제어 모드 선택: control-modes.md
        - 문제 해결: troubleshooting.md
    - 이해하기:
        - 핵심 개념: concepts.md
        - 프로젝트 구조: overview.md
        - 전신 IK와 충돌 회피: guide/whole_body_ik.md
        - 모바일 스워브 제어: guide/base_teleop.md
        - 테스트와 검증: testing.md
    - ROS2 개발자 심화 튜토리얼: guide/ros2-guide.md
    - 코드 가이드:
        - guide/index.md
        - MuJoCo 최소 개념 사전: guide/00-basics.md
        - src/grasp.py: guide/grasp.md
        - src/ik.py: guide/ik.md
        - src/arm_control.py: guide/arm_control.md
        - src/base_teleop.py: guide/base_teleop.md
        - src/whole_body_ik.py: guide/whole_body_ik.md
        - src/teleop_app.py: guide/teleop_app.md
        - src/teleop_targets.py: guide/teleop_targets.md
        - src/teleop_ui.py: guide/teleop_ui.md
        - src/teleop_render.py: guide/teleop_render.md
        - 체크리스트: guide/pitfalls.md
        - API 치트시트: guide/cheatsheet.md
    - 릴리스 기록: releases.md
