<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">의사역행렬과 DLS의 특이값 방향별 증폭 비교</title>
  <desc id="desc">특이값이 0에 가까울 때 의사역행렬의 1 나누기 시그마 증폭은 발산하지만, 람다가 0.1인 DLS의 시그마 나누기 시그마 제곱 더하기 람다 제곱 증폭은 유한하게 유지되는 그래프</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <style>
      .label { font: 18px sans-serif; fill: #172033; }
      .small { font: 15px sans-serif; fill: #475569; }
      .formula { font: 18px monospace; fill: #172033; }
    </style>
  </defs>
  <rect width="900" height="470" rx="18" fill="#f8fafc"/>
  <text x="34" y="42" class="label" font-weight="700">작은 특이값 방향에서 DLS는 관절 명령 증폭을 제한한다</text>

  <line x1="110" y1="350" x2="800" y2="350" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="110" y1="350" x2="110" y2="74" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="700" y="337" class="label">특이값 σ</text>
  <text x="30" y="80" class="small">관절 명령</text>
  <text x="43" y="100" class="small">증폭 배율</text>

  <g stroke="#cbd5e1" stroke-width="1">
    <line x1="110" y1="290" x2="780" y2="290"/>
    <line x1="110" y1="230" x2="780" y2="230"/>
    <line x1="110" y1="170" x2="780" y2="170"/>
    <line x1="240" y1="90" x2="240" y2="350" stroke-dasharray="6 6"/>
  </g>
  <text x="82" y="355" class="small">0</text>
  <text x="78" y="295" class="small">3</text>
  <text x="78" y="235" class="small">6</text>
  <text x="70" y="175" class="small">9</text>
  <text x="226" y="374" class="small">0.1</text>
  <text x="487" y="374" class="small">0.3</text>
  <text x="746" y="374" class="small">0.5</text>

  <path d="M162 80 C185 82 207 101 240 150 C285 210 350 248 500 283 C620 300 700 307 760 310"
        fill="none" stroke="#dc2626" stroke-width="6"/>
  <path d="M110 350 C142 294 174 266 207 256 C220 252 230 250 240 250 C290 250 330 262 370 270 C500 290 630 303 760 312"
        fill="none" stroke="#16a34a" stroke-width="6"/>

  <rect x="530" y="83" width="306" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="550" y1="108" x2="595" y2="108" stroke="#dc2626" stroke-width="6"/>
  <text x="610" y="114" class="formula">1/σ  → σ→0에서 발산</text>
  <line x1="550" y1="141" x2="595" y2="141" stroke="#16a34a" stroke-width="6"/>
  <text x="610" y="147" class="formula">σ/(σ²+λ²), λ=0.1</text>

  <circle cx="240" cy="250" r="7" fill="#16a34a"/>
  <text x="255" y="241" class="small">최대값 1/(2λ)=5</text>
  <text x="118" y="423" class="label">핵심: DLS gain은 σ=λ에서 최대이고, σ→0이면 다시 0으로 내려간다.</text>
</svg>
