<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-labelledby="title desc">
  <title id="title">스워브 모듈 속도 합성</title>
  <desc id="desc">차체 중심의 병진 속도와 회전 접선 속도를 더해 바퀴 모듈 속도를 만드는 평면 기하 그림</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/></marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#dc2626"/></marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#ea580c"/></marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#16a34a"/></marker>
    <style>
      .label { font: 18px sans-serif; fill: #172033; }
      .small { font: 15px sans-serif; fill: #475569; }
      .formula { font: 20px monospace; fill: #172033; }
    </style>
  </defs>
  <rect width="900" height="480" rx="18" fill="#f8fafc"/>
  <text x="34" y="42" class="label" font-weight="700">한 바퀴가 내야 하는 속도 = 차체 병진 + 회전 접선 속도</text>

  <rect x="250" y="80" width="400" height="300" rx="65" fill="#dbeafe" stroke="#64748b" stroke-width="3"/>
  <circle cx="450" cy="240" r="8" fill="#172033"/>
  <text x="463" y="246" class="small">차체 중심 C</text>

  <rect x="572" y="104" width="28" height="76" rx="8" fill="#334155" transform="rotate(-18 586 142)"/>
  <rect x="300" y="104" width="28" height="76" rx="8" fill="#334155" transform="rotate(18 314 142)"/>
  <rect x="436" y="330" width="28" height="76" rx="8" fill="#334155"/>
  <circle cx="586" cy="142" r="7" fill="#172033"/>
  <text x="535" y="91" class="small">선택한 모듈 i</text>

  <line x1="450" y1="240" x2="580" y2="147" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="488" y="188" class="label" fill="#2563eb">rᵢ=(xᵢ,yᵢ)</text>

  <line x1="586" y1="142" x2="690" y2="95" stroke="#dc2626" stroke-width="5" marker-end="url(#arrow-red)"/>
  <text x="681" y="82" class="label" fill="#dc2626">v=(vₓ,vᵧ)</text>

  <line x1="586" y1="142" x2="650" y2="230" stroke="#ea580c" stroke-width="5" marker-end="url(#arrow-orange)"/>
  <text x="657" y="231" class="label" fill="#ea580c">ω×rᵢ</text>

  <line x1="586" y1="142" x2="755" y2="182" stroke="#16a34a" stroke-width="6" marker-end="url(#arrow-green)"/>
  <text x="744" y="214" class="label" fill="#16a34a">vᵢ</text>
  <line x1="690" y1="95" x2="755" y2="182" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="650" y1="230" x2="755" y2="182" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7 7"/>

  <path d="M410 285 A70 70 0 0 1 395 202" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="352" y="304" class="label" fill="#7c3aed">ω</text>

  <rect x="105" y="406" width="690" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="145" y="438" class="formula">vᵢ = (vₓ − ωyᵢ, vᵧ + ωxᵢ)  →  조향각 atan2, 구동속도 ‖vᵢ‖/r</text>
</svg>
